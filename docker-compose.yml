services:
  db:
    image: mysql:8.4
    container_name: invoices_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: invoices_db
      MYSQL_USER: invoices_user
      MYSQL_PASSWORD: invoices_pass
    ports:
      - "3306:3306"
    volumes:
      # Persists data between container restarts.
      - invoices_db_data:/var/lib/mysql
      # MySQL automatically executes *.sql files in this directory on first
      # start (i.e. when the data volume is empty).  Schema runs first,
      # seed data runs second — alphabetical order is guaranteed.
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "invoices_user", "-pinvoices_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  invoices_db_data:
